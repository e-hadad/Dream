name: CI/CD Deploy

on:
  push:
    branches:
      - master  # אם שם הענף שלך ב-GitHub הוא master, השאירי כך.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 13.48.133.135
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # כניסה לתיקייה ועדכון קוד (הטוקן כבר מוגדר בשרת בגלל הפעולה שעשינו קודם)
            cd ~/Dream/Dream
            git pull

            # בנייה מחדש של ה-Client
            cd Dream/client
            npm install
            npm run build
            sudo cp -r dist/* /var/www/html/

            # רענון שרת ה-Node
            sudo systemctl restart node-service
            echo "Deployment Complete!"
