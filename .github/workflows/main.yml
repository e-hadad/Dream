name: CI/CD Deploy

on:
  push:
    branches:
      - master  # הענף שלך ב-GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 13.48.133.135
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. כניסה לתיקייה ועדכון קוד מה-GitHub
            cd ~/Dream/Dream
            git pull origin master

            # 2. בנייה מחדש של ה-Client (React)
            cd client
            npm install
            npm run build
            
            # 3. העתקת הקבצים המוכנים לתיקיית האתר של Nginx
            sudo cp -r dist/* /var/www/html/

            # 4. רענון השירותים (Nginx והשרת של Node)
            sudo systemctl restart nginx
            sudo systemctl restart node-service
            
            echo "Deployment Complete!"
