name: CI/CD Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 13.48.133.135
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
         script: |
            # 1. עדכון קוד
            cd /home/ubuntu/Dream/Dream
            git pull
            
            # 2. כניסה לקליינט ומחיקת תיקיית dist קודמת (חשוב מאוד!)
            cd Dream/client
            rm -rf dist
            
            # 3. בנייה מחדש נקייה
            npm install
            npm run build
            
            # 4. מחיקה מוחלטת של מה שיש ב-Nginx והעתקה חדשה
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            
            # 5. רענון שירותים
            sudo systemctl restart node-service
            sudo systemctl restart nginx
