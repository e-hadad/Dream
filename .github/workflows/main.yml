name: CI/CD Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 13.48.133.135
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. כניסה לתיקיית המקור ועדכון קוד
            cd /home/ubuntu/Dream/Dream
            git pull origin master
            
            # 2. כניסה לתיקיית הקליינט
            cd Dream/client
            
            # 3. מחיקה ובנייה מחדש עם הרשאות מתאימות
            sudo rm -rf dist
            npm install
            npm run build
            
            # 4. ניקוי תיקיית היעד והעתקה
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            
            # 5. רענון שירותים
            sudo systemctl restart node-service
            sudo systemctl restart nginx
