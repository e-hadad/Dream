name: CI/CD Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 13.48.133.135
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. עדכון הקוד בתיקיית המקור
            cd /home/ubuntu/Dream/Dream
            git pull
            
            # 2. בניית הפרויקט בנתיב המלא
            cd /home/ubuntu/Dream/Dream/Dream/client
            npm install
            npm run build
            
            # 3. ניקוי תיקיית השרת והעתקה מהנתיב שמצאנו ב-find
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/Dream/Dream/Dream/client/dist/* /var/www/html/            
            # 4. רענון השירות
            sudo systemctl restart node-service
            sudo systemctl stop node-service
            sudo systemctl start node-service
            # רענון גם ל-Nginx ליתר ביטחון
            sudo systemctl restart nginx
